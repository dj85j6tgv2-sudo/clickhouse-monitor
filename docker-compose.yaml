services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    container_name: clickhouse-monitor-test
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP
    volumes:
      - ./docker/config.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./docker/users.xml:/etc/clickhouse-server/users.d/monitor.xml:ro
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - clickhouse-data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  clickhouse-data:
